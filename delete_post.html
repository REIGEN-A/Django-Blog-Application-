{% extends "base.html" %}

{% block content %}

<div class="card p-4 shadow-sm text-center">
    <h3>Delete Post</h3>

    <p>Are you sure you want to delete this post?</p>

    <h5>{{ post.title }}</h5>

    <form method="POST">
        {% csrf_token %}
        <button class="btn btn-danger">Yes, Delete</button>
        <a href="/" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
