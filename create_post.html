{% extends "base.html" %}

{% block content %}

<h2 class="mb-3">Create Post</h2>

<form method="POST" class="card p-4 shadow-sm fade-in">

    {% csrf_token %}

    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}

    <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control" placeholder="Enter title">
    </div>

    <div class="mb-3">
        <label class="form-label">Content</label>
        <textarea name="content" class="form-control" rows="5" placeholder="Write something..."></textarea>
    </div>

    <button class="btn btn-success w-100">Create Post</button>
</form>

{% endblock %}
